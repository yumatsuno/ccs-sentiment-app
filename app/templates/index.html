<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CCS ポスト感情分析一覧</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; font-size: 0.9rem; vertical-align: top; }
    th { background: #f0f0f0; }
    .score-1 { background: #ffd6d6; }
    .score-2 { background: #ffe9d6; }
    .score-3 { background: #f5f5f5; }
    .score-4 { background: #e0f7da; }
    .score-5 { background: #c8f0c0; }
    .controls { margin-bottom: 1rem; }
    .controls form { display: inline; margin-right: 1rem; }
  </style>
</head>
<body>
  <h1>CCS（二酸化炭素地下貯留）関連ポスト 一覧</h1>

  <div class="controls">
    <form method="get" action="/">
      <label>感情フィルタ:
        <select name="label" onchange="this.form.submit()">
          <option value="">すべて</option>
          {% for l in labels %}
          <option value="{{ l }}" {% if l == selected_label %}selected{% endif %}>{{ l }}</option>
          {% endfor %}
        </select>
      </label>
    </form>

    <form method="post" action="/fetch" onsubmit="return confirm('X APIから新規ポストを取得します。よろしいですか?');">
      <label>検索キーワード:
        <input type="text" name="search_query" value="{{ search_query }}" size="50">
      </label>
      <button type="submit">新規取得</button>
    </form>

    <form method="post" action="/analyze">
      <button type="submit">未分析を分析</button>
    </form>
  </div>

  {% if message %}
  <p style="background:#fff3cd; padding:0.5rem; border:1px solid #ffeeba;">{{ message }}</p>
  {% endif %}

  <p>件数: {{ posts|length }}</p>

  <table>
    <thead>
      <tr>
        <th>投稿日時</th>
        <th>投稿者</th>
        <th>本文</th>
        <th>感情</th>
        <th>URL</th>
      </tr>
    </thead>
    <tbody>
      {% for post in posts %}
      <tr class="score-{{ post.sentiment_score or 0 }}">
        <td>{{ post.posted_at }}</td>
        <td>{{ post.author }}</td>
        <td>{{ post.text }}</td>
        <td>{{ post.sentiment_label or "未分析" }}</td>
        <td><a href="{{ post.url }}" target="_blank">link</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
